<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Museo Virtual | @paintsbydani</title>
  <link rel="icon" type="image/jpeg" href="/profile.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app">
    <!-- 3D Canvas -->
    <div id="scene-container">
      <canvas id="scene"></canvas>
    </div>

    <!-- Welcome Overlay -->
    <div id="overlay">
      <div id="overlay-brand">
        <img src="/profile.jpg" id="artist-photo" alt="@paintsbydani" />
        <h1>paintsbydani</h1>
        <p class="subtitle">Museo Virtual</p>
      </div>
      <div id="overlay-cta">
        <button id="play-btn">Entrar al Museo</button>
        <p class="controls-hint">
          <span class="desktop-only">WASD / Flechas mover &middot; Mouse mirar &middot; Click interactuar</span>
          <span class="mobile-only">Usa el joystick para moverte &middot; Toca para interactuar</span>
        </p>
      </div>
    </div>

    <!-- HUD (while walking) -->
    <div id="hud" class="hidden">
      <div id="crosshair"></div>
      <div id="room-name"></div>
      <div id="artwork-counter"></div>
      <div id="watermark">@paintsbydani</div>

      <!-- Control hints (desktop only) -->
      <div id="control-hints" class="desktop-only">
        <div class="hint-group">
          <div class="hint-keys">
            <span class="key">W</span>
            <div class="key-row">
              <span class="key">A</span>
              <span class="key">S</span>
              <span class="key">D</span>
            </div>
          </div>
          <span class="hint-label">Mover</span>
        </div>
        <div class="hint-group">
          <svg class="hint-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <rect x="6" y="2" width="12" height="20" rx="6"/>
            <line x1="12" y1="7" x2="12" y2="11"/>
          </svg>
          <span class="hint-label">Mirar</span>
        </div>
        <div class="hint-group">
          <svg class="hint-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 9V2m0 0L9 5m3-3l3 3"/>
            <path d="M5 14a7 7 0 0014 0"/>
            <circle cx="12" cy="14" r="3"/>
          </svg>
          <span class="hint-label">Click interactuar</span>
        </div>
        <div class="hint-group">
          <span class="key key-wide">ESC</span>
          <span class="hint-label">Pausar</span>
        </div>
      </div>

    </div>

    <!-- Zoom/Tour Controls (when zoomed into a painting) -->
    <div id="tour-controls" class="hidden">
      <button id="tour-prev" title="Anterior">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <span id="tour-counter">1 / 31</span>
      <button id="tour-next" title="Siguiente">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>
      <button id="tour-exit" title="Volver (ESC)">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Painting Panel (info + image when zoomed) -->
    <div id="painting-panel" class="hidden">
      <div class="panel-content">
        <img id="panel-image" src="" alt="" />
        <div class="panel-info">
          <h2 id="panel-title"></h2>
          <p id="panel-medium"></p>
          <a id="panel-instagram" href="#" target="_blank" rel="noopener noreferrer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/>
            </svg>
            Ver en Instagram
          </a>
        </div>
      </div>
    </div>

    <!-- Room transition fade -->
    <div id="room-transition"></div>

    <!-- Mobile Virtual Joystick -->
    <div id="mobile-controls" class="hidden">
      <div id="joystick-zone">
        <div id="joystick-base">
          <div id="joystick-thumb"></div>
        </div>
      </div>
      <button id="mobile-interact" title="Interactuar">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
